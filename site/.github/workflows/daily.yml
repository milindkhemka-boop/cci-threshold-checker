name: Update CCI rates daily

on:
  schedule:
    # 09:30 UTC = 15:00 IST — FBIL/RBI publishes the reference rate at 13:00 IST
    # (effective 6 Jan 2025; was 13:30 IST before), so this runs a safe 2 hours later.
    - cron: "30 9 * * *"
  workflow_dispatch: {}   # allows a manual run from the Actions tab

permissions:
  contents: write

concurrency:
  group: daily-rates
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scrape RBI rates and rebuild the page
        run: python build.py

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No rate changes today."
          else
            git commit -m "Update RBI rates ($(date -u +%F))"
            git push
          fi
