name: Daily RBI rate scrape

on:
  schedule:
    - cron: "0 13 * * *"   # 13:00 UTC ≈ 18:30 IST — after RBI's daily publication
  workflow_dispatch: {}      # allows manual "Run workflow" from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scrape RBI reference rates
        run: python3 scripts/scrape_rates.py

      - name: Commit and push if the data changed
        run: |
          git config user.name "rbi-rate-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/rates.db
          git diff --cached --quiet || git commit -m "chore: daily RBI rate update ($(date -u +%Y-%m-%d))"
          git push
